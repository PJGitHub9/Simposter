version: '3.8'

services:
  simposter:
    build: .
    container_name: simposter
    ports:
      - "8003:8003"
    # Optional: Set environment variables here OR configure via GUI Settings
    # If not set, Simposter will use values from the GUI Settings page
    environment:
      # Persist settings/output/logs in the mounted /config volume
      - CONFIG_DIR=/config
      #- LOG_DIR=/config/logs
    volumes:
      - ./config:/config
    restart: unless-stopped
